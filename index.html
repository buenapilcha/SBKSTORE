<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBK STORE</title>
    <style>
        /* Paleta Monocromática Estricta Estilo Premium */
        :root {
            --bg-main: #ffffff;
            --bg-surface: #f5f5f7;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-color: #e5e5e7;
            --sidebar-width: 240px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            position: relative;
        }

        /* --- NAVBAR SUPERIOR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: none;
        }

        .brand-logo {
            display: flex;
            align-items: center;
        }

        .brand-logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: opacity 0.2s;
        }

        .profile-btn:hover { opacity: 0.7; }

        .cart-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            padding: 6px;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background-color: var(--text-primary);
            color: var(--bg-main);
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Animación premium de escala para el contador */
        .cart-badge.pop-animation {
            transform: scale(1.3);
        }

        /* --- SIDEBAR LATERAL IZQUIERDO --- */
        .sidebar {
            position: fixed;
            top: 64px;
            left: 0;
            width: var(--sidebar-width);
            height: calc(100vh - 64px);
            background-color: var(--bg-main);
            border-right: 1px solid var(--border-color);
            padding: 32px 24px;
            z-index: 90;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-item a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .sidebar-item a:hover, .sidebar-item.active a {
            color: var(--text-primary);
            font-weight: 700;
        }

        /* Redes Sociales fijadas abajo del Sidebar */
        .sidebar-socials {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            margin-bottom: 100px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            margin-top: 64px;
            margin-left: var(--sidebar-width);
            padding: 40px;
            min-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
        }

        .catalog-view {
            display: block;
            flex-grow: 1;
        }

        .section-header {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* --- BARRA DE COMPONENTES DE FILTRADO PREMIUM --- */
        .premium-filter-bar {
            display: none; /* Se activa con JS solo en categorías */
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .filter-group-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            max-width: 600px;
        }

        .search-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .search-premium-input {
            width: 100%;
            padding: 10px 16px 10px 36px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-surface);
            color: var(--text-primary);
            outline: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-premium-input:focus {
            border-color: var(--text-primary);
            background-color: var(--bg-main);
        }

        .search-icon-lens {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .select-premium-dropdown {
            padding: 10px 16px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-surface);
            color: var(--text-primary);
            outline: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            min-width: 170px;
        }

        .select-premium-dropdown:focus {
            border-color: var(--text-primary);
        }

        .filter-group-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .layout-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .layout-select {
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- MEGA SLIDER NATIVO FLUIDO --- */
        .slider-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 48px;
        }

        .slider-container {
            display: flex;
            width: 100%;
            aspect-ratio: 1400 / 2049;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            border: 1px solid var(--border-color);
        }
        
        /* Ocultar barra de scroll nativa manteniendo la funcionalidad */
        .slider-container::-webkit-scrollbar {
            display: none;
        }
        .slider-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .slide-item {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            background-color: var(--bg-surface);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        .slide-item::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 40%);
            z-index: 1;
        }

        .slide-overlay-text {
            position: relative;
            z-index: 2;
            padding: 48px;
            color: #ffffff;
            text-transform: uppercase;
            pointer-events: none;
        }

        .slide-overlay-text h2 { font-size: 32px; font-weight: 900; letter-spacing: 1px; }
        .slide-overlay-text p { font-size: 13px; font-weight: 500; margin-top: 6px; opacity: 0.9; letter-spacing: 0.5px; }

        /* Indicadores de 3 puntos (Dots) */
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--border-color);
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .dot.active {
            background-color: var(--text-primary);
        }

        /* --- CATEGORÍAS COMO BANNERS HORIZONTALES --- */
        .categories-showcase-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 48px;
        }

        .category-card-btn {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            width: 100%;
            aspect-ratio: 1400 / 688; 
            min-height: 140px;
            display: flex;
            align-items: center;
            padding: 0 48px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .category-card-btn::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: background 0.2s;
        }

        .category-card-btn:hover { border-color: var(--text-primary); }
        .category-card-btn:hover::before { background: rgba(0, 0, 0, 0.4); }

        .category-card-name {
            position: relative;
            z-index: 2;
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .category-card-name span { font-size: 16px; transition: transform 0.2s; }
        .category-card-btn:hover .category-card-name span { transform: translateX(6px); }

        /* --- GRILLA DE PRODUCTOS ADAPTABLE --- */
        .products-grid {
            display: grid;
            gap: 24px;
            transition: all 0.2s ease-in-out;
        }

        /* Selectores de dynamic content design */
        .products-grid.grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .products-grid.grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .products-grid.grid-cols-1 { grid-template-columns: repeat(1, 1fr); }

        .product-card {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            position: relative;
        }

        /* CONTENEDOR DE LA IMAGEN CON SU VISUAL DE ETIQUETAS */
        .product-thumb-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--bg-surface);
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .product-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .product-thumb:hover { opacity: 0.85; }

        /* SUTILES ETIQUETAS PREMIUM MONOCROMÁTICAS */
        .product-tags-wrapper {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 5;
            pointer-events: none;
        }

        .premium-badge-tag {
            background-color: var(--text-primary);
            color: var(--bg-main);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 10px;
            border-radius: 0;
            width: fit-content;
        }

        .premium-badge-tag.offer-tag {
            background-color: #000000;
            border: 1px solid #ffffff;
        }

        .premium-badge-tag.discount-tag {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid var(--text-primary);
        }

        /* RENDER DE STOCK DISPONIBLE PROFESIONAL */
        .product-stock-indicator {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #008000;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-stock-indicator.low-stock {
            color: #cc0000;
        }

        .product-info { display: flex; flex-direction: column; gap: 4px; }
        .product-category { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); font-weight: 500; }
        .product-name { font-size: 14px; font-weight: 600; line-height: 1.4; }
        
        /* PRECIOS ANTERIORES TACHADOS EN DESCUENTOS */
        .price-wrapper-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .product-price { font-size: 14px; font-weight: 700; }
        .product-old-price { font-size: 12px; color: var(--text-secondary); text-decoration: line-through; font-weight: 400; }

        .add-to-cart-btn {
            margin-top: 12px;
            background-color: var(--text-primary);
            color: var(--bg-main);
            border: none;
            padding: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background-color 0.3s cubic-bezier(0.25, 1, 0.5, 1), color 0.3s ease;
        }

        /* EFECTO TEMPORAL DE AGREGADO EXITOSO */
        .add-to-cart-btn.added {
            background-color: #008000 !important;
            color: #ffffff !important;
        }

        /* --- INTERFAZ DETALLE PANTALLA COMPLETA --- */
        .detail-view-container {
            display: none;
            grid-template-columns: 1fr 400px;
            gap: 48px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-row-container { grid-column: 1 / -1; padding-bottom: 8px; }

        .btn-back-premium {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back-premium:hover { background-color: var(--text-primary); color: var(--bg-main); border-color: var(--text-primary); }

        .gallery-container { display: flex; flex-direction: column; gap: 16px; position: relative; }
        .main-detail-img-wrapper { position: relative; width: 100%; aspect-ratio: 1 / 1; background-color: var(--bg-surface); }
        .main-detail-img { width: 100%; height: 100%; object-fit: cover; }
        .thumbs-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .small-thumb { width: 100%; aspect-ratio: 1 / 1; background-color: var(--bg-surface); object-fit: cover; cursor: pointer; border: 1px solid transparent; }
        .small-thumb.active { border-color: var(--text-primary); }

        .info-panel { position: sticky; top: 104px; height: fit-content; display: flex; flex-direction: column; }
        .detail-title { font-size: 24px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; text-transform: uppercase; }
        .detail-price { font-size: 18px; font-weight: 700; margin-bottom: 6px; }

        .detail-btn-add {
            margin-top: 16px;
            background-color: var(--text-primary);
            color: var(--bg-main);
            border: none;
            padding: 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 32px;
            width: 100%;
            transition: background-color 0.3s cubic-bezier(0.25, 1, 0.5, 1), color 0.3s ease;
        }

        /* EFECTO DETALLE AGREGADO */
        .detail-btn-add.added {
            background-color: #008000 !important;
            color: #ffffff !important;
        }

        .specs-divider { border: none; border-top: 1px solid var(--border-color); margin-bottom: 20px; }
        .specs-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .specs-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .specs-list li { font-size: 13px; color: var(--text-secondary); line-height: 1.5; position: relative; padding-left: 14px; }
        .specs-list li::before { content: "•"; position: absolute; left: 0; color: var(--text-primary); }

        /* --- VENTANA MODAL DEL CARRITO --- */
        .cart-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: none; justify-content: center; align-items: center;
            z-index: 200;
        }

        .cart-modal-content {
            background-color: var(--bg-main);
            width: 100%; max-width: 480px; padding: 32px;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-height: 90vh; display: flex; flex-direction: column;
        }

        .modal-close-x { position: absolute; top: 24px; right: 24px; background: none; border: none; font-size: 20px; color: var(--text-primary); cursor: pointer; }
        .modal-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .cart-items-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; padding-right: 4px; }
        .cart-item { display: flex; gap: 16px; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
        .cart-item-img { width: 70px; height: 70px; background-color: var(--bg-surface); object-fit: cover; }
        .cart-item-details { flex-grow: 1; display: flex; flex-direction: column; gap: 2px; }
        .cart-item-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
        .cart-item-price { font-size: 13px; font-weight: 700; }
        .cart-item-qty-actions { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
        .qty-btn { background: none; border: 1px solid var(--border-color); width: 24px; height: 24px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-number { font-size: 13px; font-weight: 600; min-width: 14px; text-align: center; }
        .btn-remove-item { background: none; border: none; color: #cc0000; font-size: 11px; font-weight: 600; text-transform: uppercase; cursor: pointer; margin-left: auto; }
        
        /* --- CONTENEDOR DE LA BARRA DE CARGA DE ENVÍO --- */
        .shipping-progress-container {
            background-color: var(--bg-main);
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            display: none; /* Se activa con JS */
        }

        .shipping-progress-text {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-track-bg {
            width: 100%;
            height: 4px;
            background-color: var(--bg-surface);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--text-primary);
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .cart-total-box { display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; text-transform: uppercase; border-top: 1px solid var(--text-primary); padding-top: 16px; margin-bottom: 20px; }

        .modal-actions { display: flex; flex-direction: column; gap: 12px; }
        
        .btn-checkout { 
            background-color: var(--text-primary); 
            color: var(--bg-main); 
            border: none; 
            padding: 14px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            cursor: pointer; 
            text-align: center; 
            text-decoration: none; 
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .btn-checkout:disabled {
            background-color: #e5e5e7;
            color: #a1a1a6;
            cursor: not-allowed;
            border: 1px solid #e5e5e7;
        }

        .btn-continue { background-color: transparent; color: var(--text-primary); border: 1px solid var(--border-color); padding: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; text-align: center; }

        /* --- FOOTER INSTITUCIONAL --- */
        .footer-brand {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding: 40px 0 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-logo { display: flex; align-items: center; }
        .footer-logo-img { height: 22px; width: auto; object-fit: contain; }
        
        .footer-socials {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 4px;
        }
        
        .social-link {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        
        .social-link:hover {
            opacity: 0.6;
        }

        .footer-copyright { font-size: 11px; color: var(--text-secondary); font-weight: 400; letter-spacing: 0.2px; text-align: center; }

        /* --- SCREEN LOADER INTER-CATEGORÍAS --- */
        .premium-screen-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loader-logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: premiumPulse 1.2s ease-in-out infinite alternate;
        }

        .loader-logo-img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }

        @keyframes premiumPulse {
            0% { transform: scale(0.95); opacity: 0.5; filter: brightness(0.9); }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {

    <script type="module">
        import { clippers } from './clippers.js';
        import { trimmers } from './trimmers.js';
        import { shavers } from './shavers.js';
        import { accesorios } from './accesorios.js';

        const productosData = { clippers, trimmers, shavers, accesorios };

        let carritoArray = JSON.parse(localStorage.getItem('barber_cart_items')) || [];
        
        let seccionActual = "inicio";
        let ultimaPosicionScroll = 0;
        let bloqueandoCierreDetalle = false;

        // Estados Globales de Filtros Activos
        let filtroSeleccionado = "TODOS";
        let filtroBusqueda = "";
        let diseñoColumnas = "3";

        // Variables del Slider
        let currentSlide = 0; 
        let sliderInterval;

        const opcionesFiltros = {
            marcas: [
                { value: "TODAS", text: "TODAS LAS MARCAS" },
                { value: "WAHL", text: "WAHL" },
                { value: "BABYLISS", text: "BABYLISS" },
                { value: "VGR", text: "VGR" },
                { value: "B-WAY", text: "B-WAY" },
                { value: "KEMEI", text: "KEMEI" },
                { value: "W-MARK", text: "W-MARK" },
                { value: "EVEREST", text: "EVEREST" }
            ],
            accesorios: [
                { value: "TODOS", text: "TODOS LOS ACCESORIOS" },
                { value: "TIJERA", text: "TIJERAS" },
                { value: "CAPA", text: "CAPAS" },
                { value: "COMBO", text: "COMBOS" },
                { value: "NAVAJA", text: "NAVAJAS / NAVAJEROS" },
                { value: "ALZA", text: "ALZAS / GUÍAS" }
            ]
        };

        function actualizarOpcionesDropdown(seccion) {
            const selectDropdown = document.getElementById('brandSelect');
            if (!selectDropdown) return;
            selectDropdown.innerHTML = "";
            
            const opciones = (seccion === 'accesorios') ? opcionesFiltros.accesorios : opcionesFiltros.marcas;
            
            opciones.forEach(opt => {
                const elOption = document.createElement('option');
                elOption.value = opt.value;
                elOption.innerText = opt.text;
                selectDropdown.appendChild(elOption);
            });
        }

        window.cambiarSeccion = function(seccion) {
            const loader = document.getElementById('premiumScreenLoader');
            loader.style.display = 'flex';

            setTimeout(() => {
                seccionActual = seccion;
                bloqueandoCierreDetalle = false;
                
                filtroSeleccionado = (seccion === 'accesorios') ? "TODOS" : "TODAS";
                filtroBusqueda = "";
                
                actualizarOpcionesDropdown(seccion);
                document.getElementById('premiumSearch').value = "";
                
                clearInterval(sliderInterval);

                document.getElementById('productDetailView').style.display = 'none';
                document.getElementById('catalogView').style.display = 'block';

                const items = document.querySelectorAll('.sidebar-item');
                items.forEach(item => item.classList.remove('active'));
                
                const titleElement = document.getElementById('sectionTitle');
                const subtitleElement = document.getElementById('sectionSubtitle');
                const filterBar = document.getElementById('premiumFilterBar');
                
                if (seccion === 'inicio') {
                    titleElement.innerText = "Inicio";
                    subtitleElement.innerText = "Las Mejores Herramientas para barberia.";
                    filterBar.style.display = 'none';
                    mostrarInicioCompleto();
                } else {
                    titleElement.innerText = seccion.toUpperCase();
                    subtitleElement.innerText = `Línea profesional de la categoría ${seccion}.`;
                    filterBar.style.display = 'flex';
                    ejecutarFiltradoDeProductos();
                }

                const activeMenu = document.getElementById(`menu-${seccion}`);
                if (activeMenu) activeMenu.classList.add('active');
                
                if(document.getElementById('sidebar').classList.contains('open')) {
                    document.getElementById('sidebar').classList.remove('open');
                }
                window.scrollTo(0, 0);

                loader.style.display = 'none';
            }, 1200);
        }

        document.getElementById('brandSelect').addEventListener('change', (e) => {
            filtroSeleccionado = e.target.value;
            ejecutarFiltradoDeProductos();
        });

        document.getElementById('premiumSearch').addEventListener('input', (e) => {
            filtroBusqueda = e.target.value.toLowerCase().trim();
            ejecutarFiltradoDeProductos();
        });

        document.getElementById('layoutSelect').addEventListener('change', (e) => {
            diseñoColumnas = e.target.value;
            const grid = document.querySelector('.products-grid');
            if(grid) {
                grid.className = `products-grid grid-cols-${diseñoColumnas}`;
            }
        });

        function ejecutarFiltradoDeProductos() {
            let listadoOriginal = productosData[seccionActual] || [];

            if (filtroSeleccionado !== "TODAS" && filtroSeleccionado !== "TODOS") {
                listadoOriginal = listadoOriginal.filter(prod => 
                    prod.name.toUpperCase().includes(filtroSeleccionado)
                );
            }

            if (filtroBusqueda !== "") {
                listadoOriginal = listadoOriginal.filter(prod => 
                    prod.name.toLowerCase().includes(filtroBusqueda) || 
                    (prod.specs && prod.specs.some(sp => sp.toLowerCase().includes(filtroBusqueda)))
                );
            }

            renderizarEstructuraCatalogo(listadoOriginal);
        }

        function renderizarEstructuraCatalogo(lista) {
            const container = document.getElementById('dynamicContentContainer');
            container.innerHTML = "";

            if(lista.length === 0) {
                container.innerHTML = `<p style="font-size:12px; color:var(--text-secondary); text-align:center; padding: 60px 0; letter-spacing:1px;">NO SE ENCONTRARON PRODUCTOS DISPONIBLES.</p>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = `products-grid grid-cols-${diseñoColumnas}`;

            lista.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';

                // Lógica de Renderizado de Etiquetas (Tags)
                let tagsHTML = "";
                if (prod.isOffer) {
                    tagsHTML += `<span class="premium-badge-tag offer-tag">Oferta</span>`;
                }
                if (prod.discountTag) {
                    tagsHTML += `<span class="premium-badge-tag discount-tag">${prod.discountTag}</span>`;
                }

                // Lógica de Precios con Descuento Tachado
                let priceHTML = `<span class="product-price">${prod.price}</span>`;
                if (prod.oldPrice) {
                    priceHTML = `
                        <span class="product-price">${prod.price}</span>
                        <span class="product-old-price">${prod.oldPrice}</span>
                    `;
                }

                // Lógica de Stock superior a 50 o Crítico
                let stockHTML = "";
                if (prod.stock !== undefined) {
                    if (prod.stock <= 5) {
                        stockHTML = `<div class="product-stock-indicator low-stock">¡Últimas ${prod.stock} unidades!</div>`;
                    } else {
                        stockHTML = `<div class="product-stock-indicator">Stock Disponible: +${prod.stock}</div>`;
                    }
                }

                card.innerHTML = `
                    <div class="product-thumb-container">
                        <div class="product-tags-wrapper">${tagsHTML}</div>
                        <img class="product-thumb" src="${prod.images[0]}" alt="${prod.name}" data-id="${prod.id}" data-cat="${prod.cat.toLowerCase().trim()}">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${prod.cat}</span>
                        <span class="product-name">${prod.name}</span>
                        <div class="price-wrapper-box">${priceHTML}</div>
                        ${stockHTML}
                    </div>
                    <button class="add-to-cart-btn" data-id="${prod.id}" data-cat="${prod.cat.toLowerCase().trim()}">Añadir a la bolsa</button>
                `;
                grid.appendChild(card);
            });

            container.appendChild(grid);

            container.querySelectorAll('.product-thumb').forEach(img => {
                img.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    const cat = e.target.getAttribute('data-cat');
                    const producto = productosData[cat].find(p => p.id === id);
                    if(producto) abrirDetalleProducto(producto);
                });
            });

            container.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    const cat = e.target.getAttribute('data-cat');
                    const producto = productosData[cat].find(p => p.id === id);
                    if(producto) {
                        agregarAlCarritoObjeto(producto);
                        
                        btn.classList.add('added');
                        btn.innerText = "Añadido";
                        btn.disabled = true;
                        
                        setTimeout(() => {
                            btn.classList.remove('added');
                            btn.innerText = "Añadir a la bolsa";
                            btn.disabled = false;
                        }, 1500);
                    }
                });
            });
        }

        function mostrarInicioCompleto() {
            const container = document.getElementById('dynamicContentContainer');
            
            container.innerHTML = `
                <div class="slider-wrapper" id="sliderWrapper">
                    <div class="slider-container" id="sliderContainer">
                        <div class="slide-item" style="background-image: url('1.webp');">
                            <div class="slide-overlay-text">
                                <h2>B-WAY FASTER</h2>
                                <p>Calidad precio, profesional.</p>
                            </div>
                        </div>
                        <div class="slide-item" style="background-image: url('2.webp');">
                            <div class="slide-overlay-text">
                                <h2>Envíos Express a Todo el País</h2>
                                <p>Equipá tu barbería con stock inmediato garantizado.</p>
                            </div>
                        </div>
                        <div class="slide-item" style="background-image: url('3.webp');">
                            <div class="slide-overlay-text">
                                <h2>Hasta 6 cuotas sin interés!</h2>
                                <p>Envíos a todo el país.</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="slider-dots">
                        <span class="dot active" onclick="irAlSlideNativo(0)"></span>
                        <span class="dot" onclick="irAlSlideNativo(1)"></span>
                        <span class="dot" onclick="irAlSlideNativo(2)"></span>
                    </div>
                </div>

                <h3 class="categories-showcase-title">Explorar Colecciones</h3>
                <div class="categories-grid">
                    <div class="category-card-btn" style="background-image: url('clippers.png');" onclick="cambiarSeccion('clippers')">
                        <div class="category-card-name">Clippers <span>&rarr;</span></div>
                    </div>
                    <div class="category-card-btn" style="background-image: url('trimmers.png');" onclick="cambiarSeccion('trimmers')">
                        <div class="category-card-name">Trimmers <span>&rarr;</span></div>
                    </div>
                    <div class="category-card-btn" style="background-image: url('shavers.png');" onclick="cambiarSeccion('shavers')">
                        <div class="category-card-name">Shavers <span>&rarr;</span></div>
                    </div>
                    <div class="category-card-btn" style="background-image: url('accesorios.png');" onclick="cambiarSeccion('accesorios')">
                        <div class="category-card-name">Accesorios <span>&rarr;</span></div>
                    </div>
                </div>
            `;

            currentSlide = 0;
            const scrollContainer = document.getElementById('sliderContainer');
            
            scrollContainer.addEventListener('scroll', () => {
                const width = scrollContainer.clientWidth;
                const index = Math.round(scrollContainer.scrollLeft / width);
                if (index !== currentSlide && index >= 0 && index <= 2) {
                    currentSlide = index;
                    actualizarPuntosIndicadores(currentSlide);
                }
            });

            window.irAlSlideNativo = function(index) {
                reiniciarAutoplay();
                currentSlide = index;
                const width = scrollContainer.clientWidth;
                scrollContainer.scrollTo({
                    left: index * width,
                    behavior: 'smooth'
                });
                actualizarPuntosIndicadores(index);
            }

            sliderInterval = setInterval(autoplaySlideNativo, 5000);
        }

        function autoplaySlideNativo() {
            const scrollContainer = document.getElementById('sliderContainer');
            if (!scrollContainer) return;

            currentSlide = (currentSlide + 1) % 3;
            const width = scrollContainer.clientWidth;
            scrollContainer.scrollTo({
                left: currentSlide * width,
                behavior: 'smooth'
            });
            actualizarPuntosIndicadores(currentSlide);
        }

        function reiniciarAutoplay() {
            clearInterval(sliderInterval);
            sliderInterval = setInterval(autoplaySlideNativo, 5000);
        }

        function actualizarPuntosIndicadores(index) {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if(idx === index) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function abrirDetalleProducto(prod) {
            ultimaPosicionScroll = window.scrollY;
            clearInterval(sliderInterval);

            document.getElementById('catalogView').style.display = 'none';
            document.getElementById('premiumFilterBar').style.display = 'none'; 

            const detailContainer = document.getElementById('productDetailView');
            detailContainer.innerHTML = "";
            detailContainer.style.display = 'grid';

            if (!bloqueandoCierreDetalle) {
                history.pushState({ vista: "detalle" }, "");
                bloqueandoCierreDetalle = true;
            }

            let specsHTML = "";
            prod.specs.forEach(spec => { specsHTML += `<li>${spec}</li>`; });

            // Renderizar los elementos premium en la vista de detalle
            let tagsHTML = "";
            if (prod.isOffer) {
                tagsHTML += `<span class="premium-badge-tag offer-tag" style="margin-bottom:8px; display:inline-block;">Oferta</span> `;
            }
            if (prod.discountTag) {
                tagsHTML += `<span class="premium-badge-tag discount-tag" style="margin-bottom:8px; display:inline-block;">${prod.discountTag}</span>`;
            }

            let priceHTML = `<div class="detail-price">${prod.price}</div>`;
            if (prod.oldPrice) {
                priceHTML = `
                    <div class="price-wrapper-box" style="margin-bottom: 16px;">
                        <span class="detail-price" style="margin-bottom:0;">${prod.price}</span>
                        <span class="product-old-price" style="font-size:15px;">${prod.oldPrice}</span>
                    </div>
                `;
            }

            let stockHTML = "";
            if (prod.stock !== undefined) {
                if (prod.stock <= 5) {
                    stockHTML = `<div class="product-stock-indicator low-stock" style="margin-bottom:16px;">¡Últimas ${prod.stock} unidades disponibles!</div>`;
                } else {
                    stockHTML = `<div class="product-stock-indicator" style="margin-bottom:16px;">Disponibilidad: +${prod.stock} unidades en depósito</div>`;
                }
            }

            detailContainer.innerHTML = `
                <div class="back-row-container">
                    <button class="btn-back-premium" id="btnVolverAlCatalogo">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        Volver a ${prod.cat}
                    </button>
                </div>

                <div class="gallery-container">
                    <div class="main-detail-img-wrapper">
                        <img class="main-detail-img" id="mainDetailImg" src="${prod.images[0]}" alt="${prod.name}">
                    </div>
                    <div class="thumbs-row">
                        <img class="small-thumb active" src="${prod.images[0]}" onclick="cambiarImagenDetalle(this, '${prod.images[0]}')">
                        <img class="small-thumb" src="${prod.images[1] || prod.images[0]}" onclick="cambiarImagenDetalle(this, '${prod.images[1] || prod.images[0]}')">
                        <img class="small-thumb" src="${prod.images[2] || prod.images[0]}" onclick="cambiarImagenDetalle(this, '${prod.images[2] || prod.images[0]}')">
                    </div>
                </div>

                <div class="info-panel">
                    <div>${tagsHTML}</div>
                    <h1 class="detail-title">${prod.name}</h1>
                    ${priceHTML}
                    ${stockHTML}
                    <button class="detail-btn-add" id="btnDetailAdd">Añadir a la bolsa</button>
                    
                    <hr class="specs-divider">
                    <h3 class="specs-title">Especificaciones del Producto</h3>
                    <ul class="specs-list">
                        ${specsHTML}
                    </ul>
                </div>
            `;

            document.getElementById('btnVolverAlCatalogo').addEventListener('click', () => {
                history.back();
            });
            
            document.getElementById('btnDetailAdd').addEventListener('click', (e) => {
                agregarAlCarritoObjeto(prod);
                
                const btnDetail = document.getElementById('btnDetailAdd');
                btnDetail.classList.add('added');
                btnDetail.innerText = "Añadido";
                btnDetail.disabled = true;
                
                setTimeout(() => {
                    btnDetail.classList.remove('added');
                    btnDetail.innerText = "Añadir a la bolsa";
                    btnDetail.disabled = false;
                }, 1500);
            });

            window.scrollTo(0, 0);
        }

        function volverAlCatalogo() {
            bloqueandoCierreDetalle = false;
            document.getElementById('productDetailView').style.display = 'none';
            document.getElementById('catalogView').style.display = 'block';
            
            if (seccionActual === "inicio") {
                document.getElementById('premiumFilterBar').style.display = 'none';
                mostrarInicioCompleto();
            } else {
                document.getElementById('premiumFilterBar').style.display = 'flex';
                ejecutarFiltradoDeProductos();
            }
            window.scrollTo(0, ultimaPosicionScroll);
        }

        window.addEventListener('popstate', (e) => {
            if (document.getElementById('productDetailView').style.display === 'grid') {
                volverAlCatalogo();
            }
        });

        window.cambiarImagenDetalle = function(elemento, src) {
            document.getElementById('mainDetailImg').src = src;
            const thumbs = document.querySelectorAll('.small-thumb');
            thumbs.forEach(t => t.classList.remove('active'));
            elemento.classList.add('active');
        }

        function agregarAlCarritoObjeto(producto) {
            const categoriaLimpia = producto.cat.toLowerCase().trim();
            const itemUid = `${producto.id}_${categoriaLimpia}`;
            
            const existente = carritoArray.find(item => item.uid === itemUid);
            if (existente) {
                existente.cantidad++;
            } else {
                carritoArray.push({
                    uid: itemUid,
                    id: producto.id,
                    cat: categoriaLimpia,
                    name: producto.name,
                    price: producto.price,
                    img: producto.images[0],
                    cantidad: 1
                });
            }
            actualizarInterfazCarrito();
        }

        window.modificarCantidadItem = function(uid, cambio) {
            const item = carritoArray.find(item => item.uid === uid);
            if (item) {
                item.cantidad += cambio;
                if (item.cantidad <= 0) {
                    eliminarItemCarrito(uid);
                    return;
                }
            }
            actualizarInterfazCarrito();
        }

        window.eliminarItemCarrito = function(uid) {
            carritoArray = carritoArray.filter(item => item.uid !== uid);
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            localStorage.setItem('barber_cart_items', JSON.stringify(carritoArray));

            const listContainer = document.getElementById('cartItemsList');
            const btnCheckout = document.getElementById('btnCheckout');
            
            const progressContainer = document.getElementById('shippingProgressContainer');
            const progressText = document.getElementById('shippingProgressText');
            const progressBarFill = document.getElementById('progressBarFill');
            
            listContainer.innerHTML = "";

            let totalItemsContador = 0;
            let precioTotalAcumulado = 0;
            const MINIMO_COMPRA = 40000;

            if (carritoArray.length === 0) {
                listContainer.innerHTML = `<p style="font-size:13px; color:var(--text-secondary); text-align:center; padding: 20px 0;">Tu bolsa está vacía.</p>`;
                btnCheckout.innerText = "Tu bolsa está vacía";
                btnCheckout.disabled = true;
                progressContainer.style.display = 'none';
            } else {
                carritoArray.forEach(item => {
                    totalItemsContador += item.cantidad;
                    const numeroLimpio = parseInt(item.price.replace(/[^0-9]/g, ''));
                    precioTotalAcumulado += (numeroLimpio * item.cantidad);

                    const itemRow = document.createElement('div');
                    itemRow.className = 'cart-item';
                    itemRow.innerHTML = `
                        <img class="cart-item-img" src="${item.img}" alt="${item.name}">
                        <div class="cart-item-details">
                            <span class="cart-item-name">${item.name}</span>
                            <span class="cart-item-price">${item.price}</span>
                            <div class="cart-item-qty-actions">
                                <button class="qty-btn" onclick="modificarCantidadItem('${item.uid}', -1)">-</button>
                                <span class="qty-number">${item.cantidad}</span>
                                <button class="qty-btn" onclick="modificarCantidadItem('${item.uid}', 1)">+</button>
                            </div>
                        </div>
                        <button class="btn-remove-item" onclick="eliminarItemCarrito('${item.uid}')">Quitar</button>
                    `;
                    listContainer.appendChild(itemRow);
                });

                progressContainer.style.display = 'block';
                
                const porcentajeProgreso = Math.min((precioTotalAcumulado / MINIMO_COMPRA) * 100, 100);
                progressBarFill.style.width = `${porcentajeProgreso}%`;

                if (precioTotalAcumulado >= MINIMO_COMPRA) {
                    btnCheckout.innerText = "Proceder al pago";
                    btnCheckout.disabled = false;
                    
                    progressText.innerHTML = `
                        <span style="color:#000000;">ENVÍO GRATIS DISPONIBLE</span>
                        <span style="color:#008000;">¡COMPLETADO!</span>
                    `;
                } else {
                    const faltante = MINIMO_COMPRA - precioTotalAcumulado;
                    btnCheckout.innerText = `Mínimo $${MINIMO_COMPRA.toLocaleString('es-AR')} para envío`;
                    btnCheckout.disabled = true;
                    
                    progressText.innerHTML = `
                        <span>FALTAN $${faltante.toLocaleString('es-AR')} PARA ENVÍO GRATIS</span>
                        <span style="color:var(--text-secondary); font-weight:500;">${Math.round(porcentajeProgreso)}%</span>
                    `;
                }
            }

            const cartCounterEl = document.getElementById('cartCounter');
            if (cartCounterEl) {
                cartCounterEl.innerText = totalItemsContador;
                cartCounterEl.classList.remove('pop-animation');
                void cartCounterEl.offsetWidth; 
                cartCounterEl.classList.add('pop-animation');
                setTimeout(() => {
                    cartCounterEl.classList.remove('pop-animation');
                }, 300);
            }
            
            document.getElementById('cartTotalValue').innerText = `$${precioTotalAcumulado.toLocaleString('es-AR')}`;
        }

        window.redireccionarAPago = function() {
            if (carritoArray.length > 0) {
                window.location.href = "pago.html";
            }
        }

        window.abrirCarrito = function() { document.getElementById('cartModal').style.display = 'flex'; }
        window.cerrarCarrito = function() { document.getElementById('cartModal').style.display = 'none'; }

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        mostrarInicioCompleto();
        actualizarInterfazCarrito(); 
    </script>
</body>
</html>
